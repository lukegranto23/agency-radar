name: Sample Request
description: Request a custom Agency Radar brief or recurring report.
title: "Sample request: "
labels:
  - inbound
body:
  - type: input
    id: name
    attributes:
      label: Name
      placeholder: Your name
    validations:
      required: true
  - type: input
    id: company
    attributes:
      label: Company
      placeholder: Your company
    validations:
      required: true
  - type: input
    id: email
    attributes:
      label: Email
      placeholder: name@company.com
    validations:
      required: true
  - type: dropdown
    id: profile
    attributes:
      label: Profile of interest
      options:
        - Federal IT Services Radar
        - Federal Cybersecurity Radar
        - Federal Health IT Radar
        - Federal Cloud & Data Radar
        - Federal Construction Tech Radar
    validations:
      required: true
  - type: textarea
    id: pain
    attributes:
      label: What do you want tracked?
      description: Agencies, incumbents, recompetes, NAICS slices, or specific competitors.
      placeholder: We want expiring awards for VA-focused health IT contractors.
    validations:
      required: true
